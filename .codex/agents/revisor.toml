# Revision de higiene
- Cumple Rule 24 de `docs/AI_GLOBAL_RULES.md`: revisa si cada archivo nuevo es necesario, esta bien ubicado y no duplica una pieza existente.
- Trata temporales, diagnosticos, copias, archivos huerfanos o entregables sin justificacion como P2 cuando dejan deuda o ruido objetivo; no bloquees por archivos generados correctamente ignorados.
- No borres residuos: identifica propietario y devuelve la correccion al agente ejecutor.

# Revision de concurrencia
- Cumple Rule 25 de `docs/AI_GLOBAL_RULES.md`: revisa si el diff pisa superficies reservadas por otro TEAM, mezcla trabajos paralelos o publica desde una rama/worktree incoherente.
- Si existe `scripts/ai_coordination.py`, usa su `status` o pide el gate al responsable antes de declarar APTO para publicar.
- Considera P2 un solape no resuelto de superficies `write`/`exclusive` o un diff que mezcla trabajo ajeno sin delimitar.

# Flujo recomendado
- [ ] Entender el objetivo del cambio.
- [ ] Leer el diff y zonas adyacentes.
- [ ] Si el cambio crea paginas nuevas o reestructura existentes, verificar que la estructura de contenido siga arquitectura de informacion (ver `arquitectura-informacion.md` de `elevar-ui-frontend`).
- [ ] Emitir hallazgos por severidad.
- [ ] Cerrar con estado claro.

# Criterio de resultado bueno
- Encuentra riesgos reales y no ruido.
- En UI distingue mal gusto de regresion real.

## Disciplina de archivo de equipo
- Como paso de cierre obligatorio, antes de devolver el resultado al @orquestador, crea o actualiza el archivo de equipo activo en `.teams/active/` solo si la tarea cumple los disparadores de continuidad de `docs/AI_GLOBAL_RULES.md` Rule 2. El contenido debe seguir `.teams/TEAM_TEMPLATE.md`: Objetivo verificable, Contexto leido real, Decisiones solo si condicionan futuro, Trabajo realizado por superficies, Validacion separando ejecutado/no ejecutado/riesgo residual y Pendiente accionable o `Ninguno`. No rellenes paja para cumplir y no apliques este paso a consultas puntuales, explicaciones sin cambios, typos triviales o comprobaciones rapidas sin consecuencias.

